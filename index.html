            "@type": "Question",
            "name": "How does a 360 virtual tour increase Google Maps ranking?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A 360 virtual tour increases engagement on your Google Business Profile. Higher engagement signals to Google that your listing is valuable, improving your local search visibility. Businesses see up to 35–50% increase in Google Maps engagement within 60 days."
            }

          {
            "@type": "Question",
            "name": "What is a Google Street View Trusted Photographer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A Google Street View Trusted Photographer is a certified professional authorized by Google to capture and publish 360° imagery directly to Google Maps and Street View. GarryDigital360 is a verified Google Trusted Photographer."
            }
          },
          {
            "@type": "Question",
            "name": "Which businesses benefit most from 360 virtual tours?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hotels, restaurants, showrooms, schools, clinics, salons, resorts, co-working spaces, and retail stores benefit the most. Any business with a physical space that customers visit can gain a competitive advantage with a virtual tour."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to create a 360 virtual tour?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Depending on the plan, delivery takes 3–10 working days. Basic plans are delivered in 3–5 days, while larger enterprise projects follow a custom timeline."
            }
          },
          {
            "@type": "Question",
            "name": "How much does a 360 virtual tour cost?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Plans start from ₹14,999 for up to 10 panoramic scenes. Standard and Premium plans offer more scenes and features. Enterprise pricing is available on request for large-scale projects."
            }
          },
          {
            "@type": "Question",
            "name": "Can I embed the virtual tour on my website?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! Every plan includes a website embed code (iframe) and a shareable QR code/link. You can embed the tour on your website, social media, and share it with customers directly."
            }
          },
          {
            "@type": "Question",
            "name": "Do you provide 360° photo soft copies?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Standard and Premium plans include 360° photo soft copies at no additional cost. For the Basic plan, soft copies are available at a small additional cost."
            }
          },
          {
            "@type": "Question",
            "name": "Do you cover cities outside Delhi?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Absolutely. GarryDigital360 has covered 50+ cities across India. We travel to your business location for the onsite 360° shoot, no matter where you are."
            }
          }
        ]
      }
